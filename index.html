<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณหารบิลค่าข้าว</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card">
        <header class="card-header">
            <span class="header-icon" aria-hidden="true">🍽️</span>
            <h1>คำนวณหารบิลค่าข้าว</h1>
        </header>

        <main class="card-body">
            <div class="input-group">
                <label for="totalBill">ยอดรวม (บาท)</label>
                <input type="number" id="totalBill" placeholder="0.00" min="0" step="0.01" required>
            </div>

            <div class="input-group">
                <label for="numPeople">จำนวนคน</label>
                <input type="number" id="numPeople" placeholder="0" min="1" step="1" required>
            </div>

            <div class="input-group">
                <label for="serviceCharge">Service Charge (%)</label>
                <input type="number" id="serviceCharge" placeholder="0" min="0" max="100" step="1">
            </div>

            <button id="calculateBtn">คำนวณ</button>

            <div id="resultArea" class="result-area hidden">
                <p>ยอดรวมทั้งหมด: <strong id="totalWithService">0.00</strong> บาท</p>
                <p>แต่ละคนจ่าย: <strong id="perPerson">0.00</strong> บาท</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
