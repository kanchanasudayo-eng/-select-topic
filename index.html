<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณหารบิลค่าข้าว</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="outer-rainbow-border">
        <div class="calculator-card">
            <span class="floating-deco deco-left">🥑</span>
            <span class="floating-deco deco-right">🍓</span>
            <span class="floating-deco deco-bottom-left">🥦</span>
            <span class="floating-deco deco-bottom-right">🧋</span>

            <header class="header-section">
                <div class="food-avatar">💖 🥞 🍲</div>
                <h1 class="brand-title">คำนวณหารค่าข้าว</h1>
            </header>

            <main class="form-section">
                <div class="input-row-container">
                    <label class="input-label">ยอดรวมทั้งหมด (บาท)</label>
                    <div class="control-row">
                        <div class="input-wrapper border-green">
                            <i class="fa-solid fa-receipt input-icon icon-green"></i>
                            <input type="number" id="totalBill" placeholder="0.00" min="0" step="0.01">
                        </div>
                        <button type="button" class="btn-step bg-green" id="btn-bill-plus">+</button>
                        <button type="button" class="btn-step bg-green" id="btn-bill-minus">-</button>
                    </div>
                </div>

                <div class="input-row-container">
                    <label class="input-label">จำนวนเพื่อนคนหาร (คน)</label>
                    <div class="control-row">
                        <div class="input-wrapper border-pink">
                            <i class="fa-solid fa-users input-icon icon-pink"></i>
                            <input type="text" inputmode="numeric" id="numPeople" placeholder="1">
                        </div>
                        <button type="button" class="btn-step bg-pink" id="btn-people-plus">+</button>
                        <button type="button" class="btn-step bg-pink" id="btn-people-minus">-</button>
                    </div>
                </div>

                <div class="input-row-container">
                    <label class="input-label">Service Charge (%)</label>
                    <div class="control-row">
                        <div class="input-wrapper border-blue">
                            <i class="fa-solid fa-percentage input-icon icon-blue"></i>
                            <input type="number" id="serviceCharge" placeholder="0" min="0" max="100" step="1">
                        </div>
                        <button type="button" class="btn-step bg-blue" id="btn-service-plus">+</button>
                        <button type="button" class="btn-step bg-blue" id="btn-service-minus">-</button>
                    </div>
                </div>

                <button type="button" id="calculateBtn" class="btn-calculate">กดปุ่มเพื่อคำนวณ ✨</button>

                <div id="resultArea" class="result-display hidden">
                    <div class="dashed-line"></div>
                    <div class="result-box-inner">
                        <p class="summary-text" id="totalWithServiceText">ยอดรวมสุทธิ: 0.00 บาท</p>
                        <p class="per-person-text" id="perPersonText">จ่ายคนละ: 0.00 บาท</p>
                    </div>
                    <p class="footer-note">อิ่มอร่อย สบายกระเป๋า 🍰⭐</p>
                </div>
            </main>
        </div>
    </div>

    <p class="credit-note"> วิชา Select Topic Software จัดทำโดย กาญจนสุดา โยธพล</p>

    <script src="script.js"></script>
</body>
</html>
